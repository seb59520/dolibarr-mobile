name: dolibarr_mobile
description: "Application mobile Dolibarr ERP/CRM — Tiers, contacts, projets, tâches et factures."
publish_to: 'none'
version: 1.3.0+4

environment:
  sdk: ^3.11.5
  flutter: ">=3.41.0"

# Dépendances triées alphabétiquement (lint sort_pub_dependencies),
# y compris les SDK deps (flutter, flutter_localizations).
dependencies:
  cached_network_image: ^3.4.1
  collection: ^1.18.0
  connectivity_plus: ^6.0.5
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  drift: ^2.21.0
  drift_flutter: ^0.2.4
  equatable: ^2.0.5
  fl_chart: ^0.69.0
  flutter:
    sdk: flutter
  flutter_animate: ^4.5.0
  flutter_contacts: ^1.1.9+2
  flutter_image_compress: ^2.3.0
  flutter_localizations:
    sdk: flutter
  flutter_map: ^7.0.2
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  freezed_annotation: ^2.4.4
  go_router: ^14.6.1
  google_fonts: ^6.2.1
  image_picker: ^1.1.2
  intl: any
  json_annotation: ^4.9.0
  latlong2: ^0.9.1
  local_auth: ^2.3.0
  logger: ^2.4.0
  lucide_icons: ^0.257.0
  package_info_plus: ^8.1.1
  path_provider: ^2.1.4
  riverpod_annotation: ^2.6.1
  rxdart: ^0.28.0
  share_plus: ^10.1.2
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.1
  web: ^1.1.0

  # Persistance locale : Drift 2 (SQLite typé Dart). Décision tranchée
  # Étape 2 — voir docs/adr/0003-local-db.md. drift_flutter encapsule
  # l'init multi-plateforme (sqlite3_flutter_libs sur mobile, sqlite3.wasm
  # sur web).

dev_dependencies:
  alchemist: ^0.11.0
  build_runner: ^2.4.13
  drift_dev: ^2.21.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.2
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mocktail: ^1.0.4
  riverpod_generator: ^2.6.3
  very_good_analysis: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
