workflows:
  ios-testflight:
    name: iOS — build + publish to TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: dolibarr-mobile-asc
    environment:
      # Pas de bloc ios_signing : ses hooks pre-build appellent
      # fetch-signing-files SANS --create et échouent au premier build
      # (no matching profiles found). On gère le signing entièrement
      # dans les scripts ci-dessous.
      flutter: 3.41.9
      xcode: latest
      cocoapods: default
    scripts:
      - name: Set up keychain
        script: keychain initialize
      - name: Fetch dev + app-store signing files
        script: |
          # Fetch BOTH types : Flutter preflight exige un dev cert, et
          # l'archive Release a besoin du profile App Store.
          app-store-connect fetch-signing-files \
            "cloud.scinnova.dolibarrMobile" \
            --type IOS_APP_DEVELOPMENT \
            --create || true
          app-store-connect fetch-signing-files \
            "cloud.scinnova.dolibarrMobile" \
            --type IOS_APP_STORE \
            --create
      - name: Add certificates to keychain
        script: keychain add-certificates
      - name: Apply profiles to Xcode project
        script: xcode-project use-profiles
      - name: Diagnostic signing
        script: |
          echo "=== Profiles installed ==="
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/ || true
          echo "=== Effective build settings ==="
          cd ios
          xcodebuild -workspace Runner.xcworkspace -scheme Runner -configuration Release -showBuildSettings 2>/dev/null | grep -E "CODE_SIGN|PROVISIONING|DEVELOPMENT_TEAM|BUNDLE_IDENTIFIER" | head -20 || true
      - name: Set build number
        script: |
          BUILD_NUMBER=$(($(app-store-connect get-latest-app-store-build-number "$APP_STORE_APP_ID" 2>/dev/null || echo 0) + 1))
          echo "Build number: $BUILD_NUMBER"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> $CM_ENV
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate Drift / Freezed / JSON code
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Pod install
        script: find . -name "Podfile" -execdir pod install \;
      - name: Flutter analyze + test
        script: |
          flutter analyze
          flutter test --exclude-tags=golden
      - name: Flutter build ipa
        script: |
          flutter build ipa \
            --release \
            --build-number=$BUILD_NUMBER \
            --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - flutter_drive.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - Internal testers
        submit_to_app_store: false

  android-release:
    name: Android — release APK
    instance_type: linux_x2
    max_build_duration: 30
    environment:
      flutter: 3.41.9
      groups:
        - android_signing # optionnel : keystore prod si tu en crées un
    scripts:
      - name: Flutter pub get
        script: flutter pub get
      - name: Generate Drift / Freezed / JSON code
        script: dart run build_runner build --delete-conflicting-outputs
      - name: Flutter analyze + test
        script: |
          flutter analyze
          flutter test --exclude-tags=golden
      - name: Build Android APK
        script: flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/*-release.apk
      - build/app/outputs/bundle/release/*.aab
